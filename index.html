<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trợ Lý Phiên Dịch Neon Dual-Lang Mobile Fix</title>
    <style>
        :root {
            --bg-black: #06060c; 
            --bg-card: rgba(18, 18, 36, 0.7);  
            --neon-purple: #bf8bff; 
            --neon-cyan: #00f0ff;  
            --neon-cyan-glow: rgba(0, 240, 255, 0.4);
            --neon-gold: #ffe600; 
            --neon-red: #ff2a2a;
            --text-primary: #ffffff;
            --text-secondary: #8f8fa3;
            --glass-bg: rgba(15, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* MÀN HÌNH CHỌN TÍNH NĂNG LÚC MỞ APP */
        .welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 50%, #140a28, var(--bg-black) 80%);
        }
        .welcome-title {
            color: var(--text-primary);
            font-size: 18px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            text-align: center;
        }
        .lang-option-btn {
            width: 85%;
            max-width: 320px;
            padding: 18px;
            margin: 12px 0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            background: var(--bg-card);
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid transparent;
        }
        .lang-option-btn.en {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(191, 139, 255, 0.15);
        }
        .lang-option-btn.en:hover { box-shadow: 0 0 20px var(--neon-purple); background: rgba(191, 139, 255, 0.05); }
        .lang-option-btn.en:active { transform: scale(0.98); }
        
        .lang-option-btn.ja {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
        }
        .lang-option-btn.ja:hover { box-shadow: 0 0 20px var(--neon-cyan); background: rgba(0, 240, 255, 0.05); }
        .lang-option-btn.ja:active { transform: scale(0.98); }

        /* GIAO DIỆN CHÍNH */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 650px; 
            margin: 0 auto;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        .header {
            padding: 12px 15px;
            position: relative;
            text-align: center;
            background: rgba(6, 6, 12, 0.8);
            border-bottom: 1px solid rgba(191, 139, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .header h2 {
            margin: 0;
            font-size: 15px;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--neon-purple);
        }
        .header p {
            margin: 3px 0 0;
            font-size: 9px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
        .btn-reset {
            position: absolute;
            right: 12px; top: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            padding: 5px 8px;
            border-radius: 5px;
            font-size: 9px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .chat-log {
            flex: 1;
            display: flex;
            flex-direction: column-reverse; 
            gap: 12px;
            padding: 15px;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 100%, rgba(20, 10, 40, 0.3), transparent 70%);
        }

        .chat-row {
            background: var(--bg-card);
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: slide-in 0.25s ease-out;
        }
        @media (min-width: 500px) {
            .chat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .text-source { border-right: 1px solid rgba(255,255,255,0.05); padding-right: 10px; }
        }

        .text-source { color: #e2e2e9; font-size: 14px; line-height: 1.4; }
        .text-vi { color: var(--neon-cyan); font-size: 14px; line-height: 1.4; text-shadow: 0 0 5px var(--neon-cyan-glow); transition: color 0.3s ease; }

        .footer-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .interim {
            width: 100%;
            background: rgba(255, 230, 0, 0.04);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 230, 0, 0.3);
            color: var(--neon-gold);
            font-style: italic;
            font-size: 13px;
            text-align: center;
            display: none;
            word-wrap: break-word;
        }

        .status {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            font-weight: bold;
        }

        .btn-mic {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-mic.off {
            background: rgba(191, 139, 255, 0.04);
            border: 1px solid rgba(191, 139, 255, 0.3);
            color: var(--neon-purple);
            box-shadow: inset 0 4px 12px rgba(255, 255, 255, 0.05), 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-mic.on {
            background: rgba(255, 42, 42, 0.15);
            border: 1px solid var(--neon-red);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.4);
            animation: pulse-red 1.4s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- MÀN HÌNH LỰA CHỌN TÍNH NĂNG -->
<div id="welcome-screen" class="welcome-screen">
    <div class="welcome-title">🎙️ CHỌN CHẾ ĐỘ PHIÊN DỊCH</div>
    <div class="lang-option-btn en" onclick="selectLanguage('en')">🇬🇧 ENGLISH ➡️ TIẾNG VIỆT</div>
    <div class="lang-option-btn ja" onclick="selectLanguage('ja')">🇯🇵 JAPANESE ➡️ TIẾNG VIỆT</div>
</div>

<div class="app-container">
    <div class="header">
        <h2 id="app-title">🎙️ Neon Interpreter</h2>
        <p id="app-sub">CHƯA CẤU HÌNH</p>
        <button class="btn-reset" onclick="resetLanguage()">Đổi Bộ Dịch</button>
    </div>

    <div id="chat-log" class="chat-log"></div>

    <div class="footer-panel">
        <div id="interim-box" class="interim"></div>
        <div id="status" class="status">READY</div>

        <button id="btn-toggle" class="btn-mic off">
            <svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="22" width="22" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;
    let silenceTimer = null;
    let finalBuffer = ""; 

    let currentMode = {
        micLang: 'en-US',
        apiSl: 'en',
        guideTextSrc: '',
        guideTextVi: ''
    };

    const welcomeScreen = document.getElementById('welcome-screen');
    const appSub = document.getElementById('app-sub');
    const btnToggle = document.getElementById('btn-toggle');
    const statusDiv = document.getElementById('status');
    const interimBox = document.getElementById('interim-box');
    const chatLog = document.getElementById('chat-log');

    // KHỞI TẠO MIC CỐ ĐỊNH NGAY TỪ ĐẦU (Tối ưu tuyệt đối cho Mobile)
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true; 
        recognition.interimResults = true;

        recognition.onstart = () => {
            isListening = true;
            btnToggle.className = "btn-mic on";
            statusDiv.innerText = `LISTENING... (NÓI ${currentMode.apiSl === 'en' ? 'TIẾNG ANH' : 'TIẾNG NHẬT'})`;
            statusDiv.style.color = "var(--neon-red)";
        };

        recognition.onend = () => {
            isListening = false;
            btnToggle.className = "btn-mic off";
            statusDiv.innerText = "READY";
            statusDiv.style.color = "var(--text-secondary)";
            
            // FIX MOBILE: Nếu điện thoại tự động tắt Mic đột ngột mà vẫn còn chữ chưa dịch, ép dịch luôn!
            let pendingText = interimBox.innerText.trim();
            if (pendingText !== "") {
                translateLine(pendingText);
                finalBuffer = "";
                interimBox.innerText = "";
            }
            
            interimBox.style.display = "none";
            clearTimeout(silenceTimer);
        };

        recognition.onerror = (e) => {
            let errorMsg = e.error.toUpperCase();
            if (e.error === 'not-allowed') errorMsg = "LỖI: HÃY DÙNG LINK HTTPS / CẤP QUYỀN MIC";
            statusDiv.innerText = errorMsg;
            statusDiv.style.color = "var(--neon-red)";
            btnToggle.className = "btn-mic off";
            isListening = false;
        };

        recognition.onresult = (event) => {
            clearTimeout(silenceTimer);
            
            let interimTranscript = '';
            let newFinals = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    newFinals += event.results[i][0].transcript + (currentMode.apiSl === 'en' ? " " : "");
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            finalBuffer += newFinals;
            let completeSentence = (finalBuffer + interimTranscript).trim();

            if (completeSentence !== "") {
                interimBox.style.display = "block";
                interimBox.innerText = completeSentence;
                statusDiv.innerText = "SPEAKING...";
                statusDiv.style.color = "var(--neon-gold)";

                // Chờ người dùng dừng hẳn 1.5 giây để đóng gói câu dịch
                silenceTimer = setTimeout(() => {
                    if (completeSentence.trim() !== "") {
                        translateLine(completeSentence.trim());
                        finalBuffer = ""; 
                        interimBox.innerText = ""; // Xóa bộ đệm text để tránh trùng lập khi onend chạy
                        interimBox.style.display = "none";
                        statusDiv.innerText = `LISTENING... (NÓI ${currentMode.apiSl === 'en' ? 'TIẾNG ANH' : 'TIẾNG NHẬT'})`;
                        statusDiv.style.color = "var(--neon-red)";
                    }
                }, 1500);
            }
        };
    } else {
        statusDiv.innerText = "ĐIỆN THOẠI/TRÌNH DUYỆT KHÔNG HỖ TRỢ CHỨC NĂNG MIC";
        btnToggle.style.display = 'none';
    }

    function selectLanguage(lang) {
        if (lang === 'en') {
            currentMode.micLang = 'en-US';
            currentMode.apiSl = 'en';
            currentMode.guideTextSrc = 'Speak a long sentence freely. The system will bundle all words together before translating.';
            currentMode.guideTextVi = 'Hãy nói một câu tiếng Anh thoải mái. Hệ thống sẽ gộp toàn bộ từ lại rồi mới dịch.';
            appSub.innerText = "ENGLISH ➡️ VIETNAMESE (BUFFER 1.5S)";
        } else {
            currentMode.micLang = 'ja-JP';
            currentMode.apiSl = 'ja';
            currentMode.guideTextSrc = '日本語で自由に話してください。システムがまとめて翻訳します。';
            currentMode.guideTextVi = 'Hãy nói tiếng Nhật thoải mái. Hệ thống sẽ gộp toàn bộ câu lại rồi dịch sang tiếng Việt.';
            appSub.innerText = "JAPANESE ➡️ VIETNAMESE (BUFFER 1.5S)";
        }

        welcomeScreen.style.display = "none";
        
        chatLog.innerHTML = `
            <div class="chat-row" style="border-color: rgba(0, 240, 255, 0.15);">
                <div class="text-source" style="font-style: italic; color: var(--text-secondary);">${currentMode.guideTextSrc}</div>
                <div class="text-vi" style="font-style: italic; color: rgba(0, 240, 255, 0.6);">${currentMode.guideTextVi}</div>
            </div>
        `;
    }

    function resetLanguage() {
        if (isListening && recognition) {
            recognition.stop();
        }
        welcomeScreen.style.display = "flex";
    }

    // Sự kiện tương tác bật tắt Mic trực tiếp
    btnToggle.addEventListener('click', () => {
        if (!recognition) return;
        if (!isListening) {
            try {
                finalBuffer = "";
                recognition.lang = currentMode.micLang; // Nạp cấu hình ngôn ngữ ngay khi chạm nút
                recognition.start();
            } catch(e) { console.log(e); }
        } else {
            recognition.stop();
        }
    });

    async function translateLine(sourceText) {
        const row = document.createElement('div');
        row.className = 'chat-row';
        
        const srcDiv = document.createElement('div');
        srcDiv.className = 'text-source';
        srcDiv.innerText = sourceText;

        const viDiv = document.createElement('div');
        viDiv.className = 'text-vi';
        viDiv.innerText = "⚡ Đang dịch...";
        viDiv.style.color = "var(--text-secondary)";

        row.appendChild(srcDiv);
        row.appendChild(viDiv);
        chatLog.prepend(row); 

        setTimeout(() => chatLog.scrollTop = chatLog.scrollHeight, 50);

        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${currentMode.apiSl}&tl=vi&dt=t&q=${encodeURIComponent(sourceText)}`;
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            const data = await response.json();
            if (data?.[0]?.[0]?.[0]) {
                viDiv.innerText = data[0][0][0];
                viDiv.style.color = "var(--neon-cyan)";
            } else {
                viDiv.innerText = "❌ Lỗi định dạng dữ liệu Google.";
                viDiv.style.color = "var(--neon-red)";
            }
        } catch (error) {
            if (error.name === 'AbortError') {
                viDiv.innerText = "❌ Mạng chậm (Google phản hồi quá 5s).";
            } else {
                viDiv.innerText = "❌ Lỗi kết nối hoặc Google chặn IP tạm thời.";
            }
            viDiv.style.color = "var(--neon-red)";
        }
    }
</script>

</body>
</html>
