<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trợ Lý Phiên Dịch Neon - Vượt Tường Lửa JSONP</title>
    <style>
        :root {
            --bg-black: #06060c; 
            --bg-card: rgba(18, 18, 36, 0.7);  
            --neon-purple: #bf8bff; 
            --neon-cyan: #00f0ff;  
            --neon-cyan-glow: rgba(0, 240, 255, 0.4);
            --neon-gold: #ffe600; 
            --neon-red: #ff2a2a;
            --text-primary: #ffffff;
            --text-secondary: #8f8fa3;
            --glass-bg: rgba(15, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-primary);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* OVERLAY CHỌN NGÔN NGỮ */
        .welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            z-index: 999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 50%, #140a28, var(--bg-black) 80%);
        }
        .welcome-title {
            color: var(--text-primary);
            font-size: 18px; margin-bottom: 30px;
            letter-spacing: 2px; text-transform: uppercase;
            text-align: center;
        }
        .lang-option-btn {
            width: 85%; max-width: 320px;
            padding: 18px; margin: 12px 0;
            border-radius: 12px; font-size: 14px; font-weight: bold;
            cursor: pointer; color: #fff; background: var(--bg-card);
            text-align: center; border: 1px solid transparent;
        }
        .lang-option-btn.en { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(191, 139, 255, 0.15); }
        .lang-option-btn.en:active { background: rgba(191, 139, 255, 0.2); transform: scale(0.97); }
        .lang-option-btn.ja { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.15); }
        .lang-option-btn.ja:active { background: rgba(0, 240, 255, 0.2); transform: scale(0.97); }

        /* GIAO DIỆN CHÍNH */
        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100%; max-width: 650px; margin: 0 auto;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        .header {
            padding: 12px 15px; position: relative; text-align: center;
            background: rgba(6, 6, 12, 0.8);
            border-bottom: 1px solid rgba(191, 139, 255, 0.15);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .header h2 { margin: 0; font-size: 15px; color: var(--neon-purple); text-transform: uppercase; letter-spacing: 2px; }
        .header p { margin: 3px 0 0; font-size: 9px; color: var(--text-secondary); letter-spacing: 1px; }
        .btn-reset {
            position: absolute; right: 12px; top: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary); padding: 5px 8px; border-radius: 5px; font-size: 9px; cursor: pointer;
        }

        .chat-log {
            flex: 1; display: flex; flex-direction: column-reverse; 
            gap: 12px; padding: 15px; overflow-y: auto;
            background: radial-gradient(circle at 50% 100%, rgba(20, 10, 40, 0.3), transparent 70%);
        }

        .chat-row {
            background: var(--bg-card); padding: 12px 15px; border-radius: 10px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            display: flex; flex-direction: column; gap: 6px;
            animation: slide-in 0.22s ease-out;
        }
        @media (min-width: 500px) {
            .chat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .text-source { border-right: 1px solid rgba(255,255,255,0.05); padding-right: 10px; }
        }

        .text-source { color: #e2e2e9; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .text-vi { color: var(--neon-cyan); font-size: 14px; line-height: 1.4; text-shadow: 0 0 5px var(--neon-cyan-glow); word-break: break-word; }

        .footer-panel {
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px 25px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .interim {
            width: 100%; background: rgba(255, 230, 0, 0.04);
            padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255, 230, 0, 0.3);
            color: var(--neon-gold); font-style: italic; font-size: 13px; text-align: center;
            display: none; word-wrap: break-word;
        }

        .status { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        .btn-mic {
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease; outline: none;
        }
        .btn-mic.off { background: rgba(191, 139, 255, 0.04); border: 1px solid rgba(191, 139, 255, 0.3); color: var(--neon-purple); }
        .btn-mic.on {
            background: rgba(255, 42, 42, 0.15); border: 1px solid var(--neon-red); color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.4); animation: pulse-red 1.4s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="welcome-screen" class="welcome-screen">
    <div class="welcome-title">🎙️ CHỌN CHẾ ĐỘ PHIÊN DỊCH</div>
    <div class="lang-option-btn en" onclick="selectLanguage('en')">🇬🇧 ENGLISH ➡️ TIẾNG VIỆT</div>
    <div class="lang-option-btn ja" onclick="selectLanguage('ja')">🇯🇵 JAPANESE ➡️ TIẾNG VIỆT</div>
</div>

<div class="app-container">
    <div class="header">
        <h2>🎙️ Neon Interpreter</h2>
        <p id="app-sub">CHƯA CẤU HÌNH</p>
        <button class="btn-reset" onclick="resetLanguage()">Đổi Bộ Dịch</button>
    </div>

    <div id="chat-log" class="chat-log"></div>

    <div class="footer-panel">
        <div id="interim-box" class="interim"></div>
        <div id="status" class="status">READY</div>

        <button id="btn-toggle" class="btn-mic off">
            <svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="22" width="22" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    
    let explicitlyStopped = true; 
    let isListening = false;      
    let silenceTimer = null;
    let finalBuffer = ""; 

    let currentMode = { micLang: 'en-US', apiSl: 'en', guideTextSrc: '', guideTextVi: '' };

    const welcomeScreen = document.getElementById('welcome-screen');
    const appSub = document.getElementById('app-sub');
    const btnToggle = document.getElementById('btn-toggle');
    const statusDiv = document.getElementById('status');
    const interimBox = document.getElementById('interim-box');
    const chatLog = document.getElementById('chat-log');

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true; 
        recognition.interimResults = true;

        recognition.onstart = () => {
            isListening = true;
            btnToggle.className = "btn-mic on";
            statusDiv.innerText = `LISTENING... (NÓI ${currentMode.apiSl === 'en' ? 'TIẾNG ANH' : 'TIẾNG NHẬT'})`;
            statusDiv.style.color = "var(--neon-red)";
        };

        recognition.onend = () => {
            isListening = false;
            
            let pendingText = interimBox.innerText.trim();
            if (pendingText !== "") {
                translateLine(pendingText);
                finalBuffer = "";
                interimBox.innerText = "";
                interimBox.style.display = "none";
            }

            if (!explicitlyStopped) {
                setTimeout(() => {
                    if (!explicitlyStopped && !isListening) {
                        executeStartMic();
                    }
                }, 400); 
            } else {
                btnToggle.className = "btn-mic off";
                statusDiv.innerText = "READY";
                statusDiv.style.color = "var(--text-secondary)";
                interimBox.style.display = "none";
                clearTimeout(silenceTimer);
            }
        };

        recognition.onerror = (e) => {
            if (e.error === 'not-allowed') {
                statusDiv.innerText = "LỖI: THIẾU QUYỀN MIC TRÊN TRÌNH DUYỆT";
                statusDiv.style.color = "var(--neon-red)";
                explicitlyStopped = true;
                btnToggle.className = "btn-mic off";
            }
        };

        recognition.onresult = (event) => {
            clearTimeout(silenceTimer);
            let interimTranscript = '';
            let newFinals = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    newFinals += event.results[i][0].transcript + (currentMode.apiSl === 'en' ? " " : "");
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            finalBuffer += newFinals;
            let completeSentence = (finalBuffer + interimTranscript).trim();

            if (completeSentence !== "") {
                interimBox.style.display = "block";
                interimBox.innerText = completeSentence;
                statusDiv.innerText = "SPEAKING...";
                statusDiv.style.color = "var(--neon-gold)";

                // Tăng thời gian chờ lên 1.2s cho tiếng Nhật xử lý âm tiết mượt hơn
                silenceTimer = setTimeout(() => {
                    if (completeSentence.trim() !== "") {
                        translateLine(completeSentence.trim());
                        finalBuffer = ""; 
                        interimBox.innerText = "";
                        interimBox.style.display = "none";
                        
                        if (!explicitlyStopped) {
                            recognition.stop(); 
                        }
                    }
                }, 1200);
            }
        };
    } else {
        statusDiv.innerText = "THIẾT BỊ KHÔNG HỖ TRỢ ĐIỀU KHIỂN MIC";
        btnToggle.style.display = 'none';
    }

    function selectLanguage(lang) {
        if (lang === 'en') {
            currentMode.micLang = 'en-US'; currentMode.apiSl = 'en';
            currentMode.guideTextSrc = 'Speak freely. JSONP Mobile Bypass protocol activated.';
            currentMode.guideTextVi = 'Hãy nói tiếng Anh. Giao thức vượt rào JSONP đã sẵn sàng.';
            appSub.innerText = "ENGLISH ➡️ VIETNAMESE (JSONP FIXED)";
        } else {
            currentMode.micLang = 'ja-JP'; currentMode.apiSl = 'ja';
            currentMode.guideTextSrc = '日本語で話してください。マルチセグメントコンパイラが有効です。';
            currentMode.guideTextVi = 'Hãy nói tiếng Nhật. Bộ giải mã đa phân đoạn câu đã sẵn sàng.';
            appSub.innerText = "JAPANESE ➡️ VIETNAMESE (JSONP FIXED)";
        }

        welcomeScreen.style.display = "none";
        chatLog.innerHTML = `
            <div class="chat-row" style="border-color: rgba(0, 240, 255, 0.15);">
                <div class="text-source" style="font-style: italic; color: var(--text-secondary);">${currentMode.guideTextSrc}</div>
                <div class="text-vi" style="font-style: italic; color: rgba(0, 240, 255, 0.6);">${currentMode.guideTextVi}</div>
            </div>
        `;
    }

    function resetLanguage() {
        explicitlyStopped = true;
        if (recognition) recognition.stop();
        welcomeScreen.style.display = "flex";
    }

    function executeStartMic() {
        try {
            recognition.lang = currentMode.micLang;
            recognition.start();
        } catch(e) { console.log(e.message); }
    }

    btnToggle.addEventListener('click', () => {
        if (!recognition) return;
        if (explicitlyStopped) {
            explicitlyStopped = false;
            finalBuffer = ""; interimBox.innerText = "";
            executeStartMic();
        } else {
            explicitlyStopped = true;
            recognition.stop();
        }
    });

    // SỬ DỤNG LẠI PHƯƠNG PHÁP JSONP NHƯNG NÂNG CẤP VÒNG LẶP KHÂU NỐI ĐA PHÂN ĐOẠN (CHO TIẾNG NHẬT)
    function translateLine(sourceText) {
        const row = document.createElement('div');
        row.className = 'chat-row';
        
        const srcDiv = document.createElement('div');
        srcDiv.className = 'text-source'; srcDiv.innerText = sourceText;

        const viDiv = document.createElement('div');
        viDiv.className = 'text-vi'; viDiv.innerText = "⚡ Đang dịch...";
        viDiv.style.color = "var(--text-secondary)";

        row.appendChild(srcDiv); row.appendChild(viDiv);
        chatLog.prepend(row); 

        setTimeout(() => chatLog.scrollTop = chatLog.scrollHeight, 30);

        const callbackName = 'googleJsonp_' + Math.random().toString(36).substr(2, 9);
        
        // CỔNG HỨNG DỮ LIỆU ĐƯỢC NÂNG CẤP VÒNG LẶP FOR
        window[callbackName] = function(data) {
            try {
                if (data && data[0]) {
                    let fullTranslation = "";
                    // Quét toàn bộ các mảnh câu được trả về và khâu lại với nhau
                    for (let i = 0; i < data[0].length; i++) {
                        if (data[0][i] && data[0][i][0]) {
                            fullTranslation += data[0][i][0];
                        }
                    }
                    
                    if (fullTranslation.trim() !== "") {
                        viDiv.innerText = fullTranslation;
                        viDiv.style.color = "var(--neon-cyan)";
                    } else {
                        viDiv.innerText = "❌ Không tìm thấy dữ liệu dịch.";
                        viDiv.style.color = "var(--neon-red)";
                    }
                } else {
                    viDiv.innerText = "❌ Phản hồi trống từ máy chủ.";
                    viDiv.style.color = "var(--neon-red)";
                }
            } catch (err) {
                viDiv.innerText = "❌ Lỗi xử lý cấu trúc câu.";
                viDiv.style.color = "var(--neon-red)";
            }
            
            delete window[callbackName];
            document.getElementById(callbackName)?.remove();
        };

        const script = document.createElement('script');
        script.id = callbackName;
        script.src = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${currentMode.apiSl}&tl=vi&dt=t&q=${encodeURIComponent(sourceText)}&callback=${callbackName}`;
        
        script.onerror = function() {
            viDiv.innerText = "❌ Thiết bị chặn Script hoặc mất kết nối.";
            viDiv.style.color = "var(--neon-red)";
            delete window[callbackName];
            script.remove();
        };

        document.body.appendChild(script);
    }
</script>

</body>
</html>
