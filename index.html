<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trợ Lý Phiên Dịch Neon - Mobile Stable</title>
    <style>
        :root {
            --bg-black: #06060c; 
            --bg-card: rgba(18, 18, 36, 0.7);  
            --neon-purple: #bf8bff; 
            --neon-cyan: #00f0ff;  
            --neon-cyan-glow: rgba(0, 240, 255, 0.4);
            --neon-gold: #ffe600; 
            --neon-red: #ff2a2a;
            --text-primary: #ffffff;
            --text-secondary: #8f8fa3;
            --glass-bg: rgba(15, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 650px; 
            margin: 0 auto;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        .header {
            padding: 12px 15px;
            text-align: center;
            background: rgba(6, 6, 12, 0.8);
            border-bottom: 1px solid rgba(191, 139, 255, 0.15);
            backdrop-filter: blur(10px);
        }
        .header h2 {
            margin: 0;
            font-size: 16px;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 8px var(--neon-purple);
        }
        .header p {
            margin: 3px 0 0;
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .chat-log {
            flex: 1;
            display: flex;
            flex-direction: column-reverse; 
            gap: 12px;
            padding: 15px;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 100%, rgba(20, 10, 40, 0.3), transparent 70%);
        }
        .chat-log::-webkit-scrollbar { width: 4px; }
        .chat-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .chat-row {
            background: var(--bg-card);
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: slide-in 0.25s ease-out;
        }
        @media (min-width: 500px) {
            .chat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .text-en { border-right: 1px solid rgba(255,255,255,0.05); padding-right: 10px; }
        }

        .text-en { color: #e2e2e9; font-size: 14px; line-height: 1.4; }
        .text-vi { color: var(--neon-cyan); font-size: 14px; line-height: 1.4; text-shadow: 0 0 5px var(--neon-cyan-glow); }

        .footer-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .interim {
            width: 100%;
            background: rgba(255, 230, 0, 0.04);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 230, 0, 0.3);
            color: var(--neon-gold);
            font-style: italic;
            font-size: 13px;
            text-align: center;
            display: none;
            word-wrap: break-word;
        }

        .status {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            font-weight: bold;
        }

        .btn-mic {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            position: relative;
        }

        .btn-mic.off {
            background: rgba(191, 139, 255, 0.04);
            border: 1px solid rgba(191, 139, 255, 0.3);
            color: var(--neon-purple);
            box-shadow: 
                inset 0 4px 12px rgba(255, 255, 255, 0.05),
                inset 0 -4px 12px rgba(0, 0, 0, 0.4),
                0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-mic.off svg { filter: drop-shadow(0 0 4px var(--neon-purple)); }

        .btn-mic.on {
            background: rgba(255, 42, 42, 0.15);
            border: 1px solid var(--neon-red);
            color: #ffffff;
            box-shadow: 
                inset 0 4px 10px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(255, 42, 42, 0.4);
            animation: pulse-red 1.4s infinite;
        }
        .btn-mic.on svg { filter: drop-shadow(0 0 6px #fff); }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 42, 42, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 42, 42, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 42, 42, 0.3); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>🎙️ Neon Interpreter</h2>
        <p>STABLE ENGINE ➡️ DEBOUNCE 1.5S</p>
    </div>

    <div id="chat-log" class="chat-log">
        <div class="chat-row" style="border-color: rgba(0, 240, 255, 0.15);">
            <div class="text-en" style="font-style: italic; color: var(--text-secondary);">System check active. Watch the status text below for any mobile hardware restrictions.</div>
            <div class="text-vi" style="font-style: italic; color: rgba(0, 240, 255, 0.6);">Hệ thống kiểm tra đang chạy. Hãy nhìn dòng trạng thái phía dưới để biết lỗi phần cứng nếu có.</div>
        </div>
    </div>

    <div class="footer-panel">
        <div id="interim-box" class="interim"></div>
        <div id="status" class="status">READY</div>

        <button id="btn-toggle" class="btn-mic off">
            <svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="22" width="22" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isListening = false;
    let silenceTimer = null;
    let accumulatedText = ""; 

    const btnToggle = document.getElementById('btn-toggle');
    const statusDiv = document.getElementById('status');
    const interimBox = document.getElementById('interim-box');
    const chatLog = document.getElementById('chat-log');

    if (!SpeechRecognition) {
        statusDiv.innerText = "HỆ THỐNG KHÔNG HỖ TRỢ TRÌNH DUYỆT NÀY";
        btnToggle.style.display = 'none';
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = true; // Sử dụng lại continuous chuẩn để duy trì kết nối ổn định
        recognition.interimResults = true;

        btnToggle.addEventListener('click', () => {
            if (!isListening) {
                try {
                    accumulatedText = "";
                    recognition.start();
                } catch(e) {
                    console.log(e);
                }
            } else {
                isListening = false;
                recognition.stop();
            }
        });

        recognition.onstart = () => {
            isListening = true;
            btnToggle.className = "btn-mic on";
            statusDiv.innerText = "LISTENING... (HÃY NÓI ĐI)";
            statusDiv.style.color = "var(--neon-red)";
        };

        recognition.onend = () => {
            isListening = false;
            btnToggle.className = "btn-mic off";
            statusDiv.innerText = "READY";
            statusDiv.style.color = "var(--text-secondary)";
            interimBox.style.display = "none";
            clearTimeout(silenceTimer);
        };

        // --- BỘ BẮT LỖI PHẦN CỨNG CHI TIẾT ---
        recognition.onerror = (e) => {
            let errorMsg = e.error.toUpperCase();
            if (e.error === 'not-allowed') {
                errorMsg = "LỖI: CHƯA CHẠY LINK HTTPS HOẶC CHƯA CHO PHÉP MIC";
            } else if (e.error === 'audio-capture') {
                errorMsg = "LỖI: MIC ĐANG BỊ ỨNG DỤNG KHÁC CHIẾM GIỮ";
            } else if (e.error === 'network') {
                errorMsg = "LỖI: MẤT KẾT NỐI MẠNG";
            }
            statusDiv.innerText = errorMsg;
            statusDiv.style.color = "var(--neon-red)";
            btnToggle.className = "btn-mic off";
            isListening = false;
        };

        recognition.onresult = (event) => {
            clearTimeout(silenceTimer); // Reset bộ đếm khi nhận được âm thanh
            
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            // Kết hợp chuỗi từ kết quả cuối cùng hoặc chữ nháp
            let textToDisplay = finalTranscript || interimTranscript;

            if (textToDisplay.trim() !== "") {
                interimBox.style.display = "block";
                interimBox.innerText = textToDisplay;
                statusDiv.innerText = "SPEAKING...";
                statusDiv.style.color = "var(--neon-gold)";

                // THUẬT TOÁN ĐỢI 1.5 GIÂY IM LẶNG HOÀN TOÀN
                silenceTimer = setTimeout(() => {
                    translateLine(textToDisplay.trim());
                    // Xóa màn hình nháp sau khi đẩy dịch
                    interimBox.style.display = "none";
                    statusDiv.innerText = "LISTENING... (HÃY NÓI ĐI)";
                    statusDiv.style.color = "var(--neon-red)";
                }, 1500);
            }
        };
    }

    async function translateLine(englishText) {
        const row = document.createElement('div');
        row.className = 'chat-row';
        
        const enDiv = document.createElement('div');
        enDiv.className = 'text-en';
        enDiv.innerText = englishText;

        const viDiv = document.createElement('div');
        viDiv.className = 'text-vi';
        viDiv.innerText = "...";

        row.appendChild(enDiv);
        row.appendChild(viDiv);
        chatLog.prepend(row); 

        setTimeout(() => chatLog.scrollTop = chatLog.scrollHeight, 50);

        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(englishText)}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data?.[0]?.[0]?.[0]) {
                viDiv.innerText = data[0][0][0];
            } else {
                viDiv.innerText = "Translation error.";
            }
        } catch (error) {
            viDiv.innerText = "Network error.";
        }
    }
</script>

</body>
</html>
