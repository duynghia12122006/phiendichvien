<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trợ Lý Phiên Dịch Neon - Khối Lập Trình Tách Biệt</title>
    <style>
        :root {
            --bg-black: #06060c; 
            --bg-card: rgba(18, 18, 36, 0.7);  
            --neon-purple: #bf8bff; 
            --neon-cyan: #00f0ff;  
            --neon-cyan-glow: rgba(0, 240, 255, 0.4);
            --neon-gold: #ffe600; 
            --neon-red: #ff2a2a;
            --text-primary: #ffffff;
            --text-secondary: #8f8fa3;
            --glass-bg: rgba(15, 15, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-primary);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* MÀN HÌNH CHỌN LỰA BAN ĐẦU */
        .welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            z-index: 999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 50%, #140a28, var(--bg-black) 80%);
        }
        .welcome-title {
            color: var(--text-primary);
            font-size: 18px; margin-bottom: 30px;
            letter-spacing: 2px; text-transform: uppercase;
            text-align: center;
        }
        .lang-option-btn {
            width: 85%; max-width: 320px;
            padding: 18px; margin: 12px 0;
            border-radius: 12px; font-size: 14px; font-weight: bold;
            cursor: pointer; color: #fff; background: var(--bg-card);
            text-align: center; border: 1px solid transparent;
        }
        .lang-option-btn.en { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(191, 139, 255, 0.15); }
        .lang-option-btn.en:active { background: rgba(191, 139, 255, 0.2); transform: scale(0.97); }
        .lang-option-btn.ja { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.15); }
        .lang-option-btn.ja:active { background: rgba(0, 240, 255, 0.2); transform: scale(0.97); }

        /* KHUNG ỨNG DỤNG CHÍNH */
        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100%; max-width: 650px; margin: 0 auto;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        .header {
            padding: 12px 15px; position: relative; text-align: center;
            background: rgba(6, 6, 12, 0.8);
            border-bottom: 1px solid rgba(191, 139, 255, 0.15);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .header h2 { margin: 0; font-size: 15px; color: var(--neon-purple); text-transform: uppercase; letter-spacing: 2px; }
        .header p { margin: 3px 0 0; font-size: 9px; color: var(--text-secondary); letter-spacing: 1px; }
        .btn-reset {
            position: absolute; right: 12px; top: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary); padding: 5px 8px; border-radius: 5px; font-size: 9px; cursor: pointer;
        }

        .chat-log {
            flex: 1; display: flex; flex-direction: column-reverse; 
            gap: 12px; padding: 15px; overflow-y: auto;
            background: radial-gradient(circle at 50% 100%, rgba(20, 10, 40, 0.3), transparent 70%);
        }

        .chat-row {
            background: var(--bg-card); padding: 12px 15px; border-radius: 10px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            display: flex; flex-direction: column; gap: 6px;
            animation: slide-in 0.22s ease-out;
        }
        @media (min-width: 500px) {
            .chat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .text-source { border-right: 1px solid rgba(255,255,255,0.05); padding-right: 10px; }
        }

        .text-source { color: #e2e2e9; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .text-vi { color: var(--neon-cyan); font-size: 14px; line-height: 1.4; text-shadow: 0 0 5px var(--neon-cyan-glow); word-break: break-word; }

        .footer-panel {
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px 25px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .interim {
            width: 100%; background: rgba(255, 230, 0, 0.04);
            padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255, 230, 0, 0.3);
            color: var(--neon-gold); font-style: italic; font-size: 13px; text-align: center;
            display: none; word-wrap: break-word;
        }

        .status { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        .btn-mic {
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease; outline: none;
        }
        .btn-mic.off { background: rgba(191, 139, 255, 0.04); border: 1px solid rgba(191, 139, 255, 0.3); color: var(--neon-purple); }
        .btn-mic.on {
            background: rgba(255, 42, 42, 0.15); border: 1px solid var(--neon-red); color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.4); animation: pulse-red 1.4s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="welcome-screen" class="welcome-screen">
    <div class="welcome-title">🎙️ CHỌN CHẾ ĐỘ PHIÊN DỊCH BẢN CHUẨN</div>
    <div class="lang-option-btn en" onclick="activateEnglishModule()">🇬🇧 ENGLISH MẠNG DÂN DỤNG</div>
    <div class="lang-option-btn ja" onclick="activateJapaneseModule()">🇯🇵 JAPANESE ĐA PHÂN ĐOẠN</div>
</div>

<div class="app-container">
    <div class="header">
        <h2>🎙️ Neon Interpreter</h2>
        <p id="app-sub">CHƯA KHỞI ĐỘNG MÔ-ĐUN</p>
        <button class="btn-reset" onclick="hardResetApp()">Đổi Bộ Dịch</button>
    </div>

    <div id="chat-log" class="chat-log"></div>

    <div class="footer-panel">
        <div id="interim-box" class="interim"></div>
        <div id="status" class="status">CẦN CHỌN NGÔN NGỮ</div>

        <button id="btn-toggle" class="btn-mic off">
            <svg stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="22" width="22" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    // Con trỏ chức năng toàn cục để điều khiển nút bấm dùng chung
    let activeToggleHandler = null; 
    let activeKiller = null;

    const welcomeScreen = document.getElementById('welcome-screen');
    const appSub = document.getElementById('app-sub');
    const btnToggle = document.getElementById('btn-toggle');
    const statusDiv = document.getElementById('status');
    const interimBox = document.getElementById('interim-box');
    const chatLog = document.getElementById('chat-log');

    // Nút bấm chính sẽ chuyển hướng lệnh đến Mô-đun đang chạy hiện tại
    btnToggle.addEventListener('click', () => {
        if (activeToggleHandler) activeToggleHandler();
    });

    function hardResetApp() {
        if (activeKiller) activeKiller();
        activeToggleHandler = null;
        activeKiller = null;
        
        btnToggle.className = "btn-mic off";
        statusDiv.innerText = "CẦN CHỌN NGÔN NGỮ";
        statusDiv.style.color = "var(--text-secondary)";
        interimBox.style.display = "none";
        interimBox.innerText = "";
        appSub.innerText = "CHƯA KHỞI ĐỘNG MÔ-ĐUN";
        
        welcomeScreen.style.display = "flex";
    }

    // ==========================================
    // KHỐI 1: ENGINE TIẾNG ANH ĐỘC LẬP HOÀN TOÀN
    // ==========================================
    function activateEnglishModule() {
        welcomeScreen.style.display = "none";
        appSub.innerText = "MÔ-ĐUN ENGLISH ĐANG CHẠY";
        chatLog.innerHTML = `<div class="chat-row"><div class="text-source" style="font-style:italic;">English isolated engine online.</div><div class="text-vi" style="font-style:italic; color:rgba(0,240,255,0.5);">Đã cô lập luồng Tiếng Anh thành công.</div></div>`;

        if (!SpeechRecognition) {
            statusDiv.innerText = "TRÌNH DUYỆT KHÔNG HỖ TRỢ MIC";
            return;
        }

        let recognitionEn = new SpeechRecognition();
        recognitionEn.continuous = true;
        recognitionEn.interimResults = true;
        recognitionEn.lang = 'en-US';

        let explicitlyStoppedEn = true;
        let isListeningEn = false;
        let silenceTimerEn = null;
        let finalBufferEn = "";

        // Định nghĩa hàm dịch độc lập của Tiếng Anh
        function translateEnglishLine(text) {
            const row = document.createElement('div');
            row.className = 'chat-row';
            const srcDiv = document.createElement('div'); srcDiv.className = 'text-source'; srcDiv.innerText = text;
            const viDiv = document.createElement('div'); viDiv.className = 'text-vi'; viDiv.innerText = "⚡ Eng-Engine translating...";
            viDiv.style.color = "var(--text-secondary)";
            row.appendChild(srcDiv); row.appendChild(viDiv);
            chatLog.prepend(row);

            const cbEnName = 'cbEn_' + Math.random().toString(36).substr(2, 9);
            window[cbEnName] = function(data) {
                try {
                    if (data && data[0] && data[0][0] && data[0][0][0]) {
                        viDiv.innerText = data[0][0][0];
                        viDiv.style.color = "var(--neon-cyan)";
                    } else {
                        viDiv.innerText = "❌ English result pattern error.";
                    }
                } catch(e) { viDiv.innerText = "❌ Eng Parse Error."; }
                delete window[cbEnName];
                document.getElementById(cbEnName)?.remove();
            };

            const script = document.createElement('script');
            script.id = cbEnName;
            script.src = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(text)}&callback=${cbEnName}`;
            document.body.appendChild(script);
        }

        recognitionEn.onstart = () => {
            isListeningEn = true;
            btnToggle.className = "btn-mic on";
            statusDiv.innerText = "LISTENING ENGLISH...";
            statusDiv.style.color = "var(--neon-red)";
        };

        recognitionEn.onend = () => {
            isListeningEn = false;
            let pending = interimBox.innerText.trim();
            if (pending !== "") {
                translateEnglishLine(pending);
                finalBufferEn = ""; interimBox.innerText = ""; interimBox.style.display = "none";
            }

            if (!explicitlyStoppedEn) {
                setTimeout(() => { if (!explicitlyStoppedEn && !isListeningEn) recognitionEn.start(); }, 350);
            } else {
                btnToggle.className = "btn-mic off";
                statusDiv.innerText = "READY (EN)";
                statusDiv.style.color = "var(--text-secondary)";
                interimBox.style.display = "none";
                clearTimeout(silenceTimerEn);
            }
        };

        recognitionEn.onresult = (event) => {
            clearTimeout(silenceTimerEn);
            let interimT = ''; let newF = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) newF += event.results[i][0].transcript + " ";
                else interimT += event.results[i][0].transcript;
            }
            finalBufferEn += newF;
            let currentStr = (finalBufferEn + interimT).trim();

            if (currentStr !== "") {
                interimBox.style.display = "block";
                interimBox.innerText = currentStr;
                statusDiv.innerText = "ENGLISH SPEAKING...";
                statusDiv.style.color = "var(--neon-gold)";

                silenceTimerEn = setTimeout(() => {
                    if (currentStr.trim() !== "") {
                        translateEnglishLine(currentStr.trim());
                        finalBufferEn = ""; interimBox.innerText = ""; interimBox.style.display = "none";
                        if (!explicitlyStoppedEn) recognitionEn.stop();
                    }
                }, 1000);
            }
        };

        // Gắn điều khiển vào hệ thống dùng chung
        activeToggleHandler = function() {
            if (explicitlyStoppedEn) {
                explicitlyStoppedEn = false; finalBufferEn = ""; interimBox.innerText = "";
                try { recognitionEn.start(); } catch(e){}
            } else {
                explicitlyStoppedEn = true; recognitionEn.stop();
            }
        };

        activeKiller = function() {
            explicitlyStoppedEn = true;
            try { recognitionEn.stop(); } catch(e){}
            recognitionEn = null;
        };
    }


    // ==========================================
    // KHỐI 2: ENGINE TIẾNG NHẬT ĐỘC LẬP HOÀN TOÀN
    // ==========================================
    function activateJapaneseModule() {
        welcomeScreen.style.display = "none";
        appSub.innerText = "MÔ-ĐUN JAPANESE ĐANG CHẠY";
        chatLog.innerHTML = `<div class="chat-row"><div class="text-source" style="font-style:italic;">日本語専用エンジンが起動しました。</div><div class="text-vi" style="font-style:italic; color:rgba(0,240,255,0.5);">Đã cô lập luồng Tiếng Nhật tích hợp bộ gom mảnh câu.</div></div>`;

        if (!SpeechRecognition) {
            statusDiv.innerText = "TRÌNH DUYỆT KHÔNG HỖ TRỢ MIC";
            return;
        }

        let recognitionJa = new SpeechRecognition();
        recognitionJa.continuous = true;
        recognitionJa.interimResults = true;
        recognitionJa.lang = 'ja-JP';

        let explicitlyStoppedJa = true;
        let isListeningJa = false;
        let silenceTimerJa = null;
        let finalBufferJa = "";

        // Định nghĩa hàm dịch độc lập của Tiếng Nhật với thuật toán Gom Mảnh Đa Tầng
        function translateJapaneseLine(text) {
            const row = document.createElement('div');
            row.className = 'chat-row';
            const srcDiv = document.createElement('div'); srcDiv.className = 'text-source'; srcDiv.innerText = text;
            const viDiv = document.createElement('div'); viDiv.className = 'text-vi'; viDiv.innerText = "⚡ Ja-Engine compiling segments...";
            viDiv.style.color = "var(--text-secondary)";
            row.appendChild(srcDiv); row.appendChild(viDiv);
            chatLog.prepend(row);

            const cbJaName = 'cbJa_' + Math.random().toString(36).substr(2, 9);
            window[cbJaName] = function(data) {
                try {
                    if (data && data[0]) {
                        let compiledResult = "";
                        // Thuật toán quét và gom toàn bộ tất cả các phân đoạn ngữ pháp của tiếng Nhật
                        for (let i = 0; i < data[0].length; i++) {
                            if (data[0][i] && data[0][i][0]) {
                                compiledResult += data[0][i][0];
                            }
                        }
                        
                        if (compiledResult.trim() !== "") {
                            viDiv.innerText = compiledResult;
                            viDiv.style.color = "var(--neon-cyan)";
                        } else {
                            viDiv.innerText = "❌ Empty Japanese array return.";
                        }
                    } else {
                        viDiv.innerText = "❌ Structure mismatch from Google server.";
                    }
                } catch(e) { viDiv.innerText = "❌ Ja Parse Error."; }
                delete window[cbJaName];
                document.getElementById(cbJaName)?.remove();
            };

            const script = document.createElement('script');
            script.id = cbJaName;
            script.src = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=vi&dt=t&q=${encodeURIComponent(text)}&callback=${cbJaName}`;
            document.body.appendChild(script);
        }

        recognitionJa.onstart = () => {
            isListeningJa = true;
            btnToggle.className = "btn-mic on";
            statusDiv.innerText = "日本語を話してください...";
            statusDiv.style.color = "var(--neon-red)";
        };

        recognitionJa.onend = () => {
            isListeningJa = false;
            let pending = interimBox.innerText.trim();
            if (pending !== "") {
                translateJapaneseLine(pending);
                finalBufferJa = ""; interimBox.innerText = ""; interimBox.style.display = "none";
            }

            if (!explicitlyStoppedJa) {
                setTimeout(() => { if (!explicitlyStoppedJa && !isListeningJa) recognitionJa.start(); }, 400);
            } else {
                btnToggle.className = "btn-mic off";
                statusDiv.innerText = "READY (JA)";
                statusDiv.style.color = "var(--text-secondary)";
                interimBox.style.display = "none";
                clearTimeout(silenceTimerJa);
            }
        };

        recognitionJa.onresult = (event) => {
            clearTimeout(silenceTimerJa);
            let interimT = ''; let newF = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) newF += event.results[i][0].transcript;
                else interimT += event.results[i][0].transcript;
            }
            finalBufferJa += newF;
            let currentStr = (finalBufferJa + interimT).trim();

            if (currentStr !== "") {
                interimBox.style.display = "block";
                interimBox.innerText = currentStr;
                statusDiv.innerText = "日本語発言 trung...";
                statusDiv.style.color = "var(--neon-gold)";

                // Tiếng Nhật cần thời gian nghỉ dài hơn một chút (1.3s) để không bị ngắt câu giữa chừng
                silenceTimerJa = setTimeout(() => {
                    if (currentStr.trim() !== "") {
                        translateJapaneseLine(currentStr.trim());
                        finalBufferJa = ""; interimBox.innerText = ""; interimBox.style.display = "none";
                        if (!explicitlyStoppedJa) recognitionJa.stop();
                    }
                }, 1300);
            }
        };

        activeToggleHandler = function() {
            if (explicitlyStoppedJa) {
                explicitlyStoppedJa = false; finalBufferJa = ""; interimBox.innerText = "";
                try { recognitionJa.start(); } catch(e){}
            } else {
                explicitlyStoppedJa = true; recognitionJa.stop();
            }
        };

        activeKiller = function() {
            explicitlyStoppedJa = true;
            try { recognitionJa.stop(); } catch(e){}
            recognitionJa = null;
        };
    }
</script>

</body>
</html>
